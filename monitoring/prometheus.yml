global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: 'karez-system'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'karez-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'karez-backend'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'karez-backend-pprof'
    metrics_path: '/debug/pprof'
    static_configs:
      - targets: ['backend:6060']
        labels:
          service: 'karez-backend-pprof'
    scrape_interval: 60s
    scrape_timeout: 10s
    params:
      seconds: ['5']

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescaledb:5432']
        labels:
          service: 'timescaledb'
    scrape_interval: 30s

  - job_name: 'mosquitto'
    static_configs:
      - targets: ['mosquitto:1883']
        labels:
          service: 'mosquitto'
    scrape_interval: 30s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
    scrape_interval: 15s
