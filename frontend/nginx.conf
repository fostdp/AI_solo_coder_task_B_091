worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    aio             threads;

    keepalive_timeout  65;
    keepalive_requests 1000;

    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/csv
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/octet-stream
        font/opentype
        font/truetype
        font/eot
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon
        image/png
        image/jpeg
        image/gif
        image/webp
        image/bmp;
    gzip_disable "msie6";

    gzip_static on;

    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen       80;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        charset utf-8;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws:; font-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self'" always;

        location / {
            try_files $uri $uri/ /index.html;

            expires 1h;
            add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        }

        location ~* \.(?:js|css|json)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        location ~* \.(?:jpg|jpeg|png|gif|ico|svg|webp|bmp)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location ~* \.(?:woff|woff2|ttf|eot|otf)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location ~* \.(?:mp4|webm|ogg|mp3|wav)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        location = /robots.txt {
            allow all;
            access_log off;
            log_not_found off;
        }
    }
}
